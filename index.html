<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexus Platinum | Creamos Datahub</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0e1a;
      --surface:   #111827;
      --border:    #1e293b;
      --primary:   #3b82f6;
      --accent:    #10b981;
      --danger:    #ef4444;
      --warning:   #f59e0b;
      --text:      #f1f5f9;
      --muted:     #64748b;
      --card:      #1a202c;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px 16px 40px;
    }

    .wrap { max-width: 1200px; margin: 0 auto; }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }

    .logo { display: flex; align-items: center; gap: 12px; }
    .logo-icon {
      width: 42px; height: 42px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
    }
    .logo-icon svg { width: 22px; height: 22px; stroke: white; fill: none; stroke-width: 2.5; }
    .logo-text h1 { font-size: 1.3rem; font-weight: 700; }
    .logo-text p { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 12px;
      margin-right: auto;
    }
    .tab-btn {
      background: transparent;
      border: none;
      color: var(--muted);
      padding: 8px 16px;
      cursor: pointer;
      font-weight: 500;
      font-size: 0.9rem;
      transition: color .2s;
      border-bottom: 2px solid transparent;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }

    /* Stats */
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }
    .stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
    }
    .stat-val { font-size: 1.8rem; font-weight: 800; color: var(--primary); }
    .stat-lbl { font-size: 0.75rem; color: var(--muted); margin-top: 6px; text-transform: uppercase; }

    /* Secciones */
    .section { display: none; }
    .section.active { display: block; animation: fadeIn .3s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    /* Search section */
    .search-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px;
      margin-bottom: 28px;
    }

    .search-row {
      display: flex;
      gap: 10px;
      position: relative;
      margin-bottom: 12px;
    }

    #q {
      flex: 1;
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 1rem;
      font-family: 'Inter', sans-serif;
      transition: border-color .2s;
    }
    #q:focus { outline: none; border-color: var(--primary); }
    #q::placeholder { color: var(--muted); }

    .btn-search {
      background: var(--primary);
      color: white;
      border: none;
      padding: 12px 28px;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s, transform .1s;
      white-space: nowrap;
    }
    .btn-search:hover { background: #2563eb; transform: translateY(-1px); }

    #suggestions {
      display: none;
      position: absolute;
      top: calc(100% + 8px);
      left: 0; right: 0;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      max-height: 300px;
      overflow-y: auto;
      z-index: 100;
      box-shadow: 0 12px 40px rgba(0,0,0,.5);
    }
    .sug-item {
      padding: 12px 16px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: background .1s;
    }
    .sug-item:last-child { border-bottom: none; }
    .sug-item:hover { background: rgba(59,130,246,.1); color: var(--primary); }

    /* Results */
    #results { display: flex; flex-direction: column; gap: 16px; }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      animation: slideUp .3s ease;
    }
    @keyframes slideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

    .card-head {
      padding: 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
    }

    .card-left { flex: 1; }
    .card-name { font-size: 1.2rem; font-weight: 700; margin-bottom: 10px; }
    .pills { display: flex; flex-wrap: wrap; gap: 8px; }
    .pill {
      background: rgba(255,255,255,.06);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 10px;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--muted);
    }

    .form-list { padding: 0; }
    .form-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      border-bottom: 1px solid rgba(255,255,255,.04);
      gap: 12px;
    }
    .form-row:last-child { border-bottom: none; }
    .form-row:hover { background: rgba(255,255,255,.02); }

    .form-left { display: flex; align-items: center; gap: 12px; flex: 1; }
    .form-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot-ok { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
    .dot-no { background: var(--danger); box-shadow: 0 0 6px var(--danger); }
    .form-label { font-size: 0.9rem; font-weight: 500; }

    .form-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .badge {
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 0.7rem;
      font-weight: 700;
    }
    .badge-ok { background: rgba(16,185,129,.15); color: var(--accent); }
    .badge-no { background: rgba(239,68,68,.15); color: var(--danger); }

    /* CSV Upload */
    .csv-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px;
      margin-bottom: 28px;
    }

    .upload-area {
      border: 2px dashed var(--border);
      border-radius: 10px;
      padding: 40px;
      text-align: center;
      cursor: pointer;
      transition: all .2s;
      margin-bottom: 16px;
    }
    .upload-area:hover {
      border-color: var(--primary);
      background: rgba(59,130,246,.05);
    }
    .upload-area.dragover {
      border-color: var(--primary);
      background: rgba(59,130,246,.1);
    }

    .upload-icon { font-size: 2rem; margin-bottom: 8px; }
    .upload-text { color: var(--muted); margin-bottom: 4px; }
    .upload-hint { font-size: 0.85rem; color: var(--muted); }

    #csv-input { display: none; }

    .csv-buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .btn-upload, .btn-export {
      background: var(--primary);
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s;
      font-size: 0.9rem;
    }
    .btn-upload:hover { background: #2563eb; }
    .btn-export { background: var(--accent); }
    .btn-export:hover { background: #059669; }
    .btn-export:disabled { opacity: 0.5; cursor: not-allowed; }

    #progress-bar {
      width: 100%;
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      margin: 16px 0;
      overflow: hidden;
      display: none;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      transition: width .3s;
    }

    #csv-results {
      display: none;
      overflow-x: auto;
      margin-top: 16px;
    }
    .results-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }
    .results-table thead {
      background: var(--card);
      border-bottom: 2px solid var(--border);
    }
    .results-table th {
      padding: 12px;
      text-align: left;
      font-weight: 600;
      color: var(--muted);
    }
    .results-table td {
      padding: 12px;
      border-bottom: 1px solid var(--border);
    }
    .results-table tbody tr:hover { background: rgba(59,130,246,.05); }
    .results-table .status-ok { color: var(--accent); font-weight: 600; }
    .results-table .status-no { color: var(--danger); font-weight: 600; }

    /* Loader */
    #loader { display: none; text-align: center; padding: 40px; }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Empty state */
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }

    /* Admin buttons */
    .admin-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .btn-admin {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 10px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      transition: all .2s;
    }
    .btn-admin:hover { border-color: var(--primary); color: var(--primary); background: rgba(59,130,246,.06); }

    #status-msg {
      font-size: 0.85rem;
      color: var(--muted);
      margin-top: 8px;
      min-height: 18px;
      transition: color .3s;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .wrap { padding: 0 8px; }
      .header { flex-direction: column; align-items: flex-start; gap: 12px; }
      .tabs { flex-wrap: wrap; margin-right: 0; }
      .stats { grid-template-columns: repeat(2, 1fr); }
      .card-head { flex-direction: column; }
      .form-row { flex-direction: column; align-items: flex-start; }
      .form-right { width: 100%; }
      .csv-buttons { flex-direction: column; }
      .btn-upload, .btn-export { width: 100%; }
    }
  </style>
</head>
<body>
<div class="wrap">

  <!-- Header -->
  <div class="header">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
      </div>
      <div class="logo-text">
        <h1>Nexus Platinum</h1>
        <p>Creamos Datahub · Verificación</p>
      </div>
    </div>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('search')">🔍 Buscar</button>
      <button class="tab-btn" onclick="switchTab('bulk')">📤 Cargar CSV</button>
      <button class="tab-btn" onclick="switchTab('admin')">⚙️ Admin</button>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats">
    <div class="stat">
      <div class="stat-val" id="s-total">—</div>
      <div class="stat-lbl">Participantes</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="s-forms">—</div>
      <div class="stat-lbl">Formularios</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="s-refresh" style="font-size:0.85rem;color:var(--muted);">—</div>
      <div class="stat-lbl">Último sync</div>
    </div>
  </div>

  <!-- TAB: SEARCH -->
  <div id="search" class="section active">
    <div class="search-wrap">
      <div class="search-row">
        <input id="q" type="text" placeholder="Buscar por nombre, ID Creamos o DPI…" autocomplete="off" spellcheck="false">
        <button class="btn-search" id="btn-buscar">🔍 Buscar</button>
      </div>
      <div id="suggestions"></div>
    </div>

    <div id="loader">
      <div class="spinner"></div>
      <p style="color:var(--muted);font-size:.9rem;">Buscando…</p>
    </div>

    <div id="results"></div>
  </div>

  <!-- TAB: CSV UPLOAD -->
  <div id="bulk" class="section">
    <div class="csv-section">
      <h3 style="margin-bottom: 20px;">Cargar Lista de Participantes</h3>

      <div class="upload-area" id="upload-area" onclick="document.getElementById('csv-input').click();">
        <div class="upload-icon">📄</div>
        <div class="upload-text"><strong>Arrastra un CSV aquí</strong> o haz clic para seleccionar</div>
        <div class="upload-hint">Debe tener columna: "Nombre" o "ID" o ambas</div>
      </div>

      <input id="csv-input" type="file" accept=".csv" onchange="handleFileUpload(event)">

      <div class="csv-buttons">
        <button class="btn-upload" onclick="document.getElementById('csv-input').click();">📁 Seleccionar Archivo</button>
        <button class="btn-export" id="btn-export" disabled>💾 Exportar Resultados</button>
      </div>

      <div id="progress-bar">
        <div class="progress-fill" style="width: 0%;"></div>
      </div>

      <div id="csv-results"></div>
    </div>
  </div>

  <!-- TAB: ADMIN -->
  <div id="admin" class="section">
    <div class="csv-section">
      <h3 style="margin-bottom: 20px;">Administración</h3>

      <div class="admin-row">
        <button class="btn-admin" id="btn-sync">🔄 Sincronizar Kobo</button>
        <button class="btn-admin" id="btn-diag">🩺 Diagnóstico</button>
      </div>

      <div id="status-msg"></div>
    </div>
  </div>

</div>

<script>
  const API_URL = window.API_URL || 'https://script.google.com/macros/s/YOUR_ID_HERE/exec';
  let allNames = [];
  let csvResults = [];

  // Load on init
  window.addEventListener('DOMContentLoaded', () => {
    loadStats();
    loadParticipantNames();

    // Search
    document.getElementById('q').addEventListener('input', showSuggestions);
    document.getElementById('q').addEventListener('keydown', e => {
      if (e.key === 'Enter') doSearch();
    });
    document.getElementById('btn-buscar').addEventListener('click', doSearch);

    // Close suggestions
    document.addEventListener('click', e => {
      if (e.target.id !== 'q') hideSuggestions();
    });

    // Upload drag & drop
    const ua = document.getElementById('upload-area');
    ua.addEventListener('dragover', e => {
      e.preventDefault();
      ua.classList.add('dragover');
    });
    ua.addEventListener('dragleave', () => ua.classList.remove('dragover'));
    ua.addEventListener('drop', e => {
      e.preventDefault();
      ua.classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      if (file) handleFileUpload({ target: { files: [file] } });
    });

    // Admin
    document.getElementById('btn-sync').addEventListener('click', syncNow);
    document.getElementById('btn-diag').addEventListener('click', runDiag);
  });

  function switchTab(tab) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById(tab).classList.add('active');
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
  }

  function loadStats() {
    fetch(`${API_URL}?action=stats`)
      .then(r => r.json())
      .then(s => {
        if (s.success) {
          document.getElementById('s-total').textContent = s.totalParticipants || '0';
          document.getElementById('s-forms').textContent = s.totalForms || '0';
          document.getElementById('s-refresh').textContent = s.lastRefresh || 'Pendiente';
        }
      })
      .catch(e => console.log('Stats error:', e));
  }

  function loadParticipantNames() {
    fetch(`${API_URL}?action=names`)
      .then(r => r.json())
      .then(names => { allNames = names || []; })
      .catch(e => console.log('Names error:', e));
  }

  // Search
  function showSuggestions() {
    const val = this.value.trim().toLowerCase();
    const panel = document.getElementById('suggestions');
    if (val.length < 2) { hideSuggestions(); return; }

    const matches = allNames.filter(n => n.toLowerCase().includes(val)).slice(0, 10);
    if (!matches.length) { hideSuggestions(); return; }

    panel.innerHTML = matches.map(m =>
      `<div class="sug-item" data-name="${m}">${m}</div>`
    ).join('');
    panel.style.display = 'block';

    panel.querySelectorAll('.sug-item').forEach(el => {
      el.addEventListener('click', () => {
        document.getElementById('q').value = el.dataset.name;
        hideSuggestions();
        doSearch();
      });
    });
  }

  function hideSuggestions() {
    document.getElementById('suggestions').style.display = 'none';
  }

  function doSearch() {
    const q = document.getElementById('q').value.trim();
    if (!q) return;
    hideSuggestions();

    document.getElementById('results').innerHTML = '';
    document.getElementById('loader').style.display = 'block';

    fetch(`${API_URL}?action=search&q=${encodeURIComponent(q)}`)
      .then(r => r.json())
      .then(data => {
        document.getElementById('loader').style.display = 'none';
        if (data.success) renderResults(data.data);
        else showEmpty(data.message || 'No encontrado');
      })
      .catch(e => {
        document.getElementById('loader').style.display = 'none';
        showEmpty('Error: ' + e.message);
      });
  }

  function renderResults(list) {
    const container = document.getElementById('results');
    const forms = [
      { key: 'Formulario de Apoyo Emocional - Primera Vez (2025)', label: 'Apoyo Emocional — 1ra vez (2025)' },
      { key: 'Formulario de Apoyo Emocional - Siguientes Veces (2025)', label: 'Apoyo Emocional — Seguimiento (2025)' },
      { key: 'Formulario de Bienestar (2026)', label: 'Bienestar (2026)' },
      { key: 'Línea de Base - Entrada (2025)', label: 'Línea de Base (2025)' },
      { key: 'Línea de Base - Entrada (2026)', label: 'Línea de Base (2026)' }
    ];

    list.forEach(p => {
      let rowsHtml = '';
      forms.forEach(f => {
        const fd = p.Formularios[f.key];
        const ok = fd && fd.status === 'SI';
        const url = fd && fd.url ? fd.url : '';

        rowsHtml += `
          <div class="form-row">
            <div class="form-left">
              <div class="form-dot ${ok ? 'dot-ok' : 'dot-no'}"></div>
              <span class="form-label">${f.label}</span>
            </div>
            <div class="form-right">
              ${!ok && url ? `<a href="${url}" target="_blank" style="color:var(--primary);text-decoration:none;font-size:0.85rem;">Llenar →</a>` : ''}
              <span class="badge ${ok ? 'badge-ok' : 'badge-no'}">${ok ? '✅ Completado' : '❌ Pendiente'}</span>
            </div>
          </div>
        `;
      });

      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div class="card-head">
          <div class="card-left">
            <div class="card-name">${p.Nombre}</div>
            <div class="pills">
              <span class="pill"><strong>ID:</strong> ${p.ID || 'N/A'}</span>
              <span class="pill"><strong>DPI:</strong> ${p.DPI || 'N/A'}</span>
              <span class="pill"><strong>Ingreso:</strong> ${p.AgnoIngreso || 'N/A'}</span>
              <span class="pill"><strong>Edad:</strong> ${p.Edad || '--'}</span>
            </div>
          </div>
        </div>
        <div class="form-list">${rowsHtml}</div>
      `;
      container.appendChild(card);
    });
  }

  function showEmpty(msg) {
    document.getElementById('results').innerHTML = `
      <div class="empty">
        <p>🔍 ${msg}</p>
      </div>
    `;
  }

  // CSV Upload
  function handleFileUpload(e) {
    const file = e.target.files?.[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = async event => {
      const csv = event.target.result;
      const lines = csv.split('\n').filter(l => l.trim());
      if (lines.length < 2) { alert('CSV vacío o inválido'); return; }

      const headers = lines[0].split(',').map(h => h.trim().toLowerCase());
      const nameIdx = headers.findIndex(h => h.includes('nombre'));
      const idIdx = headers.findIndex(h => h.includes('id'));

      if (nameIdx === -1 && idIdx === -1) {
        alert('CSV debe tener columna "Nombre" o "ID"');
        return;
      }

      csvResults = [];
      const queries = [];
      for (let i = 1; i < lines.length; i++) {
        const cols = lines[i].split(',').map(c => c.trim());
        const name = nameIdx !== -1 ? cols[nameIdx] : '';
        const id = idIdx !== -1 ? cols[idIdx] : '';
        const q = (name || id).trim();
        if (q) queries.push(q);
      }

      // Progress bar
      document.getElementById('progress-bar').style.display = 'block';
      document.getElementById('csv-results').innerHTML = '<p style="color:var(--muted);">Procesando...</p>';

      // Batch search (5 en paralelo)
      const batchSize = 5;
      for (let i = 0; i < queries.length; i += batchSize) {
        const batch = queries.slice(i, i + batchSize);
        await Promise.all(batch.map(q =>
          fetch(`${API_URL}?action=search&q=${encodeURIComponent(q)}`)
            .then(r => r.json())
            .then(data => {
              if (data.success && data.data?.length) csvResults.push(data.data[0]);
            })
        ));

        // Update progress
        const pct = Math.min(100, ((i + batchSize) / queries.length) * 100);
        document.querySelector('.progress-fill').style.width = pct + '%';
      }

      // Mostrar resultados
      renderCsvResults();
      document.getElementById('btn-export').disabled = false;
    };
    reader.readAsText(file);
  }

  function renderCsvResults() {
    const forms = ['Formulario de Apoyo Emocional - Primera Vez (2025)', 'Formulario de Apoyo Emocional - Siguientes Veces (2025)', 'Formulario de Bienestar (2026)', 'Línea de Base - Entrada (2025)', 'Línea de Base - Entrada (2026)'];

    let html = '<table class="results-table"><thead><tr><th>Nombre</th>';
    forms.forEach(f => {
      const short = f.includes('Primera') ? '1ra vez' : f.includes('Siguientes') ? 'Seguimiento' : f.includes('Bienestar') ? 'Bienestar' : f.includes('2026') ? 'LB 2026' : 'LB 2025';
      html += `<th>${short}</th>`;
    });
    html += '</tr></thead><tbody>';

    csvResults.forEach(p => {
      html += `<tr><td><strong>${p.Nombre}</strong></td>`;
      forms.forEach(f => {
        const ok = p.Formularios[f]?.status === 'SI';
        html += `<td class="${ok ? 'status-ok' : 'status-no'}">${ok ? '✅' : '❌'}</td>`;
      });
      html += '</tr>';
    });

    html += '</tbody></table>';
    document.getElementById('csv-results').innerHTML = html;
    document.getElementById('csv-results').style.display = 'block';
  }

  function exportCsv() {
    if (!csvResults.length) return;
    const forms = ['Formulario de Apoyo Emocional - Primera Vez (2025)', 'Formulario de Apoyo Emocional - Siguientes Veces (2025)', 'Formulario de Bienestar (2026)', 'Línea de Base - Entrada (2025)', 'Línea de Base - Entrada (2026)'];
    let csv = 'Nombre,' + forms.map(f => f.substring(0, 30)).join(',') + '\n';
    csvResults.forEach(p => {
      csv += p.Nombre + ',' + forms.map(f => p.Formularios[f]?.status === 'SI' ? 'SI' : 'NO').join(',') + '\n';
    });

    const a = document.createElement('a');
    a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
    a.download = 'resultados_' + new Date().getTime() + '.csv';
    a.click();
  }

  document.getElementById('btn-export').addEventListener('click', exportCsv);

  // Admin
  function setMsg(txt, color) {
    const el = document.getElementById('status-msg');
    el.textContent = txt;
    el.style.color = color || 'var(--muted)';
  }

  function syncNow() {
    const btn = document.getElementById('btn-sync');
    btn.disabled = true;
    btn.textContent = '⏳ Sincronizando…';
    setMsg('Descargando datos desde Kobo…', '#3b82f6');

    fetch(`${API_URL}?action=sync`)
      .then(r => r.json())
      .then(data => {
        btn.disabled = false;
        btn.textContent = '🔄 Sincronizar Kobo';
        setMsg(data.message || '✅ Sincronización completa', 'var(--accent)');
        loadStats();
      })
      .catch(e => {
        btn.disabled = false;
        btn.textContent = '🔄 Sincronizar Kobo';
        setMsg('❌ Error: ' + e.message, 'var(--danger)');
      });
  }

  function runDiag() {
    const btn = document.getElementById('btn-diag');
    btn.disabled = true;
    btn.textContent = '⏳ Diagnosticando…';
    setMsg('Verificando conexiones…', '#3b82f6');

    fetch(`${API_URL}?action=diagnostico`)
      .then(r => r.json())
      .then(data => {
        btn.disabled = false;
        btn.textContent = '🩺 Diagnóstico';
        if (data.success) {
          const diag = data.diagnostics;
          let msg = (diag.apiKey ? '✅' : '❌') + ' Kobo, ';
          let okForms = Object.values(diag.forms).filter(f => f.ok).length;
          msg += okForms + '/' + Object.keys(diag.forms).length + ' formularios';
          setMsg(msg, 'var(--accent)');
        }
      })
      .catch(e => {
        btn.disabled = false;
        btn.textContent = '🩺 Diagnóstico';
        setMsg('❌ Error: ' + e.message, 'var(--danger)');
      });
  }
</script>
</body>
</html>
